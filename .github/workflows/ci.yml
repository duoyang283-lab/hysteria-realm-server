name: CI

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
        run: go build -trimpath -ldflags="-s -w" -o hysteria-realm-server-linux-${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: hysteria-realm-server-linux-${{ matrix.arch }}
          path: hysteria-realm-server-linux-${{ matrix.arch }}
          if-no-files-found: error
